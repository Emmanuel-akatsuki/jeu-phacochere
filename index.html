<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Moteur de Jeu - La Poursuite du Lion</title>
    <style>
    </style>
</head>
<body>
    <div class="ui">
        <h1>PROJET ICT4D L2 - MOTEUR DE JEU</h1>
        <p>Aide : <span class="kbd">ESPACE</span> Sauter | <span class="kbd">↓</span> Glisser</p>
    </div>

    <canvas id="gameCanvas" width="800" height="300"></canvas>
    <script src=".src/Lieu.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- 1. VARIABLES DU MOTEUR (LEAD DEV) ---
        let gameSpeed = 5;
        const gravity = 0.8;
        let lastTime = 0;
        let score = 0;
        let isGameOver = false;

        // --- 2. ÉTAT DES ENTITÉS ---
        const player = {
            x: 150, // Positionné un peu devant pour laisser de la place au lion
            y: 200,
            w: 40, h: 60,
            baseH: 60, slideH: 30,
            dy: 0, jumpF: -15,
            isGrounded: true, isSliding: false
        };

        const lion = {
            x: 20, // Il est juste derrière !
            y: 200,
            w: 80, h: 60,
            offsetY: 0 // Pour simuler un petit mouvement de course
        };

        let obstacles = [
            { x: 900, y: 220, w: 30, h: 40, type: 'ROCHER' },
            { x: 1400, y: 140, w: 50, h: 20, type: 'BRANCHE' }
        ];

        // --- 3. CONTRÔLES ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && player.isGrounded) {
                player.dy = player.jumpF;
                player.isGrounded = false;
            }
            if (e.code === 'ArrowDown' && player.isGrounded) {
                player.isSliding = true;
                player.h = player.slideH;
                player.y += 30; // On ajuste la position pour coller au sol
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowDown') {
                player.isSliding = false;
                player.y -= (player.baseH - player.h);
                player.h = player.baseH;
            }
        });

        // --- 4. LOGIQUE DU MOTEUR ---
        function update(deltaTime) {
            if (isGameOver) return;

            // La vitesse augmente pour simuler l'adrénaline
            gameSpeed += 0.0005 * deltaTime;
            score += Math.floor(gameSpeed / 5);

            // Physique du Saut
            player.dy += gravity;
            player.y += player.dy;

            // Collision Sol
            if (player.y + player.h > 260) {
                player.y = 260 - player.h;
                player.dy = 0;
                player.isGrounded = true;
            }

            // Mouvement du lion (oscillation pour l'effet de course)
            lion.offsetY = Math.sin(Date.now() / 100) * 5;

            // Gestion des Obstacles
            obstacles.forEach(obs => {
                obs.x -= gameSpeed;

                if (obs.x < -obs.w) {
                    obs.x = 800 + Math.random() * 400;
                }

                // DÉTECTION COLLISION (TA MISSION PRINCIPALE)
                if (
                    player.x < obs.x + obs.w &&
                    player.x + player.w > obs.x &&
                    player.y < obs.y + obs.h &&
                    player.y + player.h > obs.y
                ) {
                    gameOver();
                }
            });
        }

        // --- 5. DESSIN (MOTEUR GRAPHIQUE) ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Sol de la forêt
            ctx.fillStyle = '#1b3d1b';
            ctx.fillRect(0, 260, 800, 40);

            // Dessin du LION (Le poursuivant)
            ctx.fillStyle = '#e67e22';
            ctx.fillRect(lion.x, lion.y + lion.offsetY, lion.w, lion.h);
            ctx.fillStyle = 'red'; // Yeux du lion
            ctx.fillRect(lion.x + lion.w - 15, lion.y + lion.offsetY + 15, 5, 5);

            // Dessin du JOUEUR
            ctx.fillStyle = player.isSliding ? '#ff6b9d' : '#7c6fff';
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Dessin Obstacles
            ctx.fillStyle = '#5d4037'; // Marron pour rochers/branches
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            });

            // UI Score et Vitesse
            ctx.fillStyle = "white";
            ctx.font = "16px Arial";
            ctx.fillText(`Distance: ${score}m`, 20, 30);
            ctx.fillText(`Vitesse Lion: ${gameSpeed.toFixed(1)} km/h`, 20, 50);
        }

        function gameOver() {
            isGameOver = true;
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillRect(0,0,800,300);
            ctx.fillStyle = "red";
            ctx.font = "40px Arial";
            ctx.textAlign = "center";
            ctx.fillText("LE LION VOUS A RATTRAPÉ !", 400, 150);
        }

        function gameLoop(timestamp) {
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            update(deltaTime);
            draw();
            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
