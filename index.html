<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jeu Phacochère - La Poursuite du Lion</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { 
            background: #0a1a0a; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow: hidden; 
            margin: 0;
            touch-action: none;
        }
        canvas { 
            border: 4px solid #2d5a27; 
            background: #1a2e1a; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5); 
            border-radius: 10px; 
            margin-top: 20px; 
            max-width: 95vw;
        }
        .ui { margin-top: 15px; text-align: center; }
        .kbd { background: #333; padding: 2px 8px; border-radius: 4px; border: 1px solid #555; }
    </style>
</head>
<body>
    <div class="ui">
        <h1>JEU PHACOCHÈRE</h1>
        <p>Contrôles : <span class="kbd">↑</span> Sauter | <span class="kbd">↓</span> Glisser</p>
        <p>Tactile : Swipe Up / Tap pour sauter, Swipe Down pour glisser</p>
    </div>

    <canvas id="gameCanvas" width="800" height="300"></canvas>

    <!-- Script loading order is important -->
    <script src="src/Joueurs.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
